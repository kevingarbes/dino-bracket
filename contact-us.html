<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us - Dino Bracket</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="images/Dino%20Bracket%20Site%20Icon.png">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Dino Bracket home">
      <img src="images/Dino Bracket Logo transparent.png" alt="Dino Bracket Logo">
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="tournaments.html">Tournaments</a>
    </nav>
  </header>

  <main>
    <section class="page-heading">
      <p class="kicker">Contact</p>
      <h1>Contact Us</h1>
      <p>Have a question, suggestion, or bracket idea? Send us a note.</p>
    </section>

    <section class="policy-card contact-card">
      <iframe data-tally-src="https://tally.so/embed/D4MkLX?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="200" frameborder="0" marginheight="0" marginwidth="0" title="Contact Us"></iframe>
    </section>
  </main>

  <footer class="site-footer">
    <nav aria-label="Footer">
      <a href="contact-us.html">Contact Us</a>
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms-and-conditions.html">Terms and Conditions</a>
    </nav>
  </footer>

  <script src="global.js"></script>
  <script>
    var d = document;
    var w = "https://tally.so/widgets/embed.js";
    var v = function () {
      if (typeof Tally !== "undefined") {
        Tally.loadEmbeds();
      } else {
        d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
          e.src = e.dataset.tallySrc;
        });
      }
    };
    if (typeof Tally !== "undefined") {
      v();
    } else if (d.querySelector('script[src="' + w + '"]') == null) {
      var s = d.createElement("script");
      s.src = w;
      s.onload = v;
      s.onerror = v;
      d.body.appendChild(s);
    }
  </script>
</body>
</html>
